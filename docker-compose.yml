services:
  poflow:
    build: .
    ports:
      - "9090:9090"
    volumes:
      - poflow-data:/data
    environment:
      - POFLOW_DATA_DIR=/data
      - POFLOW_GUI_DIR=/usr/share/poflow/gui
      - RUST_LOG=poflow_daemon=info
      # Bind to all interfaces inside container
      - POFLOW_BIND_ADDRESS=0.0.0.0
      # Optional: set root password (otherwise auto-generated)
      # - POFLOW_ROOT_PASSWORD=changeme
      # Optional: disable public registration
      # - POFLOW_ALLOW_REGISTRATION=false
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  poflow-data:
